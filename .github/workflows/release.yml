name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a GitHub release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build:web

      - name: Package
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" || "${{ github.event.inputs.publish }}" == "true" ]]; then
            npx electron-builder --publish always
          else
            npx electron-builder --publish never
          fi

      - name: Upload dry-run artifacts
        if: ${{ !(github.ref_type == 'tag' || github.event.inputs.publish == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-print-manage-${{ matrix.os }}
          path: release/**
